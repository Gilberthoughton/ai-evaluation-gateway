# Local development dependencies. The app and worker run on the host (pnpm dev / pnpm worker);
# this brings up the datastores they need.
services:
  postgres:
    image: postgres:16
    container_name: aeg-postgres
    environment:
      POSTGRES_USER: aeg
      POSTGRES_PASSWORD: aeg
      POSTGRES_DB: aeg
    ports:
      - '5432:5432'
    volumes:
      - aeg-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aeg -d aeg']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: aeg-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aeg-pgdata:

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test:unit

      # Integration tests use Testcontainers; the runner's Docker daemon provides Postgres + Redis.
      - name: Integration tests
        run: pnpm test:integration

  docker:
    name: docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t ai-evaluation-gateway:ci .
